<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaveUs — Seguimiento de emergencia</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    header {
      background: #b91c1c; color: #fff; padding: 14px 18px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    header .pulse {
      width: 12px; height: 12px; border-radius: 50%; background: #fff;
      animation: pulse 1.2s infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,.7); }
      70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }
    header h1 { font-size: 1.05rem; font-weight: 700; }
    header .sub { font-size: .8rem; opacity: .95; width: 100%; }
    #map { flex: 1; width: 100%; background: #e5e7eb; }
    #bar {
      background: #111827; color: #e5e7eb; padding: 10px 18px;
      font-size: .85rem; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    #bar a { color: #93c5fd; text-decoration: none; font-weight: 600; }
    .estado-cancelada header { background: #16a34a; }
    #banner {
      display: none; background: #16a34a; color: #fff; text-align: center;
      padding: 10px; font-weight: 700;
    }
    /* Marcador propio: no depende de imagenes externas de Leaflet */
    .sos-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: #b91c1c; border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(185,28,28,.35);
      animation: dot 1.4s infinite;
    }
    @keyframes dot {
      0% { box-shadow: 0 0 0 0 rgba(185,28,28,.5); }
      70% { box-shadow: 0 0 0 16px rgba(185,28,28,0); }
      100% { box-shadow: 0 0 0 0 rgba(185,28,28,0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="pulse"></span>
      <h1 id="titulo">Emergencia activa</h1>
      <span class="sub" id="subtitulo">Conectando con el servidor…</span>
    </header>
    <div id="banner"></div>
    <div id="map"></div>
    <div id="bar">
      <span id="precision">Precisión: —</span>
      <a id="gmaps" href="#" target="_blank" rel="noopener">Abrir en Google Maps</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const EMERGENCIA_ID = "__EMERGENCIA_ID__";
    const ESTADO_URL = `/emergencia/${EMERGENCIA_ID}/estado`;

    let map = null;
    let marker = null;
    let accuracyCircle = null;
    let trail = null;
    let centradoInicial = false;
    let primerIntento = true;

    // Icono propio (punto rojo CSS) — evita el bug de iconos de Leaflet via CDN
    const sosIcon = L.divIcon({
      className: "",
      html: '<div class="sos-dot"></div>',
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });

    function initMap() {
      map = L.map("map", { zoomControl: true }).setView([4.7110, -74.0721], 5);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap",
      }).addTo(map);
      trail = L.polyline([], { color: "#b91c1c", weight: 4, opacity: 0.7 }).addTo(map);
    }

    function setSub(texto) {
      document.getElementById("subtitulo").textContent = texto;
    }

    function actualizarMapa(estado) {
      const loc = estado.ubicacion;
      const titulo = document.getElementById("titulo");
      const precision = document.getElementById("precision");
      const gmaps = document.getElementById("gmaps");
      const banner = document.getElementById("banner");
      const app = document.getElementById("app");

      titulo.textContent = `Emergencia de ${estado.nombre_usuario || "usuario"}`;

      if (estado.estado === "cancelada") {
        app.classList.add("estado-cancelada");
        banner.style.display = "block";
        banner.textContent = "✅ La emergencia fue cancelada. La persona está a salvo.";
        const p = document.querySelector(".pulse");
        if (p) p.style.display = "none";
      }

      if (!loc) {
        setSub("Emergencia activa — esperando la primera señal de GPS del dispositivo…");
        return;
      }

      const latlng = [loc.lat, loc.lng];
      const fecha = new Date(loc.timestamp).toLocaleTimeString("es-CO");
      setSub((loc.address ? loc.address + " — " : "") + "Actualizado: " + fecha);
      precision.textContent = `Precisión: ±${Math.round(loc.accuracy || 0)} m`;
      gmaps.href = `https://www.google.com/maps?q=${loc.lat},${loc.lng}`;

      if (!marker) {
        marker = L.marker(latlng, { icon: sosIcon }).addTo(map);
        accuracyCircle = L.circle(latlng, {
          radius: loc.accuracy || 0, color: "#b91c1c", fillColor: "#b91c1c", fillOpacity: 0.12, weight: 1,
        }).addTo(map);
      } else {
        marker.setLatLng(latlng);
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(loc.accuracy || 0);
      }

      if (Array.isArray(estado.historial) && estado.historial.length > 0) {
        trail.setLatLngs(estado.historial.map((p) => [p.lat, p.lng]));
      }

      if (!centradoInicial) {
        map.setView(latlng, 16);
        centradoInicial = true;
      } else {
        map.panTo(latlng);
      }
    }

    async function poll() {
      try {
        const res = await fetch(ESTADO_URL, { cache: "no-store" });
        if (res.ok) {
          primerIntento = false;
          actualizarMapa(await res.json());
        } else if (res.status === 404) {
          setSub("No se encontró esta emergencia (pudo expirar o reiniciarse el servidor).");
        } else {
          setSub("El servidor respondió con un error. Reintentando…");
        }
      } catch (e) {
        if (primerIntento) {
          setSub("Conectando con el servidor… (puede tardar unos segundos)");
        } else {
          setSub("Conexión interrumpida. Reintentando…");
        }
      }
    }

    initMap();
    poll();
    setInterval(poll, 4000);
  </script>
</body>
</html>
